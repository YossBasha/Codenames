name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Cache npm dependencies (server + client)
      - name: Cache npm (server)
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: npm-server-${{ hashFiles('server/package-lock.json') }}

      - name: Cache npm (client)
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: npm-client-${{ hashFiles('client/package-lock.json') }}

      # Cache Gradle wrapper + caches (avoids re-downloading Gradle zip every run)
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('client/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle caches (deps, build)
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ hashFiles('client/android/**/*.gradle*', 'client/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-caches-

      # Cache Android SDK components installed by Gradle (NDK, CMake, etc.)
      - name: Cache Android SDK extras
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Android\android-sdk
          key: android-sdk-${{ hashFiles('client/android/**/*.gradle*') }}
          restore-keys: |
            android-sdk-

      - name: Install Server Dependencies
        run: |
          cd server
          npm install --no-audit --no-fund

      - name: Install Client Dependencies
        run: |
          cd client
          npm install --no-audit --no-fund

      - name: Build Electron App
        run: |
          cd client
          npm run electron:build -- -p never

      - name: Build Android APK
        run: |
          cd client
          npm run android:build

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          generate_release_notes: true
          files: |
            client/dist-electron/*.exe
            client/dist-electron/*.blockmap
            client/dist-electron/latest.yml
            client/android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
